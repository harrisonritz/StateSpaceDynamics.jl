name: Benchmark PR (AirspeedVelocity)

# Runs the `benchmark/benchmarks.jl` SUITE on both the PR head and its base,
# in the same environment, and posts a comparison table as a PR comment.
# Uses `pull_request_target` so the comment can be posted; the AirspeedVelocity
# action freezes the benchmark script at the base revision, so PR code cannot
# rewrite what is benchmarked.

on:
  pull_request_target:
    branches:
      - main
  workflow_dispatch:  # manual run from the Actions tab

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: "1"
